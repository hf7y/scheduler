# The scheduler's OWN schedule entry -- it eats its own dogfood and runs a
# nightly job against the backlog in .scheduler/FOCUS.md. Tier 2 only
# (there's no fast web tracker to sweep).
#
# This file lives at .scheduler/schedule.conf (the project's own
# self-contained scheduler folder, deliberately OUTSIDE .claude/ -- see
# "Permission gate" resolution 2026-07-20 in FOCUS.md: unattended `claude -p`
# hard-refuses Edit/Write under .claude/** as a "sensitive file", confirmed by
# a controlled A/B test, so anything an unattended run needs to write must
# live outside .claude/ entirely) and is symlinked to schedule/scheduler.conf
# so bin/sync-crontab.sh finds it -- the reference for the per-project folder
# model every other project is migrating onto (see FOCUS.md focus item 2).
#
# This job is SPECIAL (see ~/.local/bin/scheduler-nightly-batch-loop.sh):
# the scheduler is the meta-tool controlling every other job, so its wrapper
# does NOT use the shared engine. It works in a throwaway git worktree on a
# nightly/<date> branch and leaves the result for HUMAN REVIEW -- nothing
# auto-merges, and it never pushes (the GitHub remote is human-driven).
#
# Explicit BATCH_CRON (not "auto") 03:00: deliberately AFTER the other
# projects' nightly batches (chezz 01:00, home-assistant 01:30, vkv 02:00)
# so a self-improvement run can see the night's reports, and so registering
# it doesn't reshuffle the existing auto-batch slots. 03:00 daily doesn't
# collide with wtul's 03:14 Wed/Sat.

PROJECT="scheduler"
PROJECT_REPO_PATH="/home/zach/Documents/Project Archive/scheduler"
# Self-contained-folder model: FOCUS.md/QUESTIONS.md live here, OUTSIDE
# .claude/ (see note above -- that's now the point, not just organization).
# bin/sync-crontab.sh reads this to aim the focus/+questions/ symlinks.
# Default (unset) is ".claude" for not-yet-migrated projects -- those
# projects hit the same permission gate on their own .claude/QUESTIONS.md
# today; migrating them to SCHEDULER_SUBDIR=".scheduler" is the fix.
SCHEDULER_SUBDIR=".scheduler"

# No Tier 1 sweep for the scheduler.
SWEEP_JOB_NAME=""
SWEEP_SCRIPT=""
SWEEP_CRON=""

BATCH_JOB_NAME="scheduler-nightly-batch"
BATCH_SCRIPT="/home/zach/.local/bin/scheduler-nightly-batch-loop.sh"
BATCH_CRON="0 3 * * *"

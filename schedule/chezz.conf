# chezz's schedule entry. JOB_NAME/PROJECT_KEY values here match
# ~/.local/bin/chezz-bug-sweep-loop.sh and
# ~/.local/bin/chezz-nightly-batch-loop.sh exactly (confirmed 2026-07-17).
#
# CRON VALUES BELOW ARE PROPOSED DEFAULTS, NOT A CONFIRMED DECISION --
# they're exactly the example numbers this repo's own README floated
# under "Open decisions" (9am-9pm daytime sweep window, 1am nightly
# batch). Chezz's real crontab entry today is still the original
# `*/15 * * * *` with NO window at all. Edit SWEEP_CRON/BATCH_CRON below
# to whatever hours are actually wanted, then run
# `bin/sync-crontab.sh --apply`.
#
# MIGRATION NOTE (resolved 2026-07-17): the old raw unmanaged crontab line
# was removed by hand and this file applied -- chezz's crontab is now
# fully scheduler-managed, no duplicate firing.

PROJECT="chezz"
# Where this project's own working copy lives -- used by bin/sync-crontab.sh
# to symlink its .claude/QUESTIONS.md into ../questions/<PROJECT>.md and its
# .claude/FOCUS.md into ../focus/<PROJECT>.md. chezz stays on the default
# ".claude" subdir (its commands live in .claude/commands/); it does NOT set
# SCHEDULER_SUBDIR, so it is not on the self-contained .claude/scheduler/
# model that `scheduler` itself uses -- both files link fine from .claude/.
PROJECT_REPO_PATH="/home/zach/Documents/Project Archive/chezz"

# PAUSED 2026-07-19 pending migration into the usage-paced governor (see
# scheduler-usage-pacing task backlog) -- fixed-cron Tier 1 sweeps compete
# with the burn-rate pacing on Tier 2, so sweeps are parked (blank
# SWEEP_JOB_NAME = tier disabled, per sync-crontab.sh) until they're folded
# into usage-gate.sh dispatch too. To re-enable as-is in the meantime,
# restore SWEEP_JOB_NAME/SWEEP_SCRIPT/SWEEP_CRON below + re-run
# bin/sync-crontab.sh --apply.
SWEEP_JOB_NAME=""
# SWEEP_SCRIPT="/home/zach/.local/bin/chezz-bug-sweep-loop.sh"
# SWEEP_CRON="*/15 0,2-23 * * *"

BATCH_JOB_NAME="chezz-nightly-batch"
BATCH_SCRIPT="/home/zach/.local/bin/chezz-nightly-batch-loop.sh"
BATCH_CRON="auto"  # let bin/sync-crontab.sh assign a batch slot (see
                    # schedule/_batch.conf) instead of a hand-picked time

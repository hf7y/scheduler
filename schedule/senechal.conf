# senechal -- retrospective environment-observer journal for Zach's Linux
# laptop, scaffolded by realisateur from a dropped inbox note.
# Registered 2026-07-22.
#
# Follows the crt/realisateur/groc-mangr/vim-arcade/gardien precedent: git
# repo pushed to a LOCAL bare remote (no credentials/network needed),
# generic bin/scheduler-run entrypoint, joins the usage-paced governor as a
# Tier 2 participant (see schedule/_paced.conf) instead of a fixed cron time.
#
# Scope is unattended-safe because .claude/commands/nightly-batch.md
# explicitly forbids running a real scan against Zach's actual home
# directory during an unattended run -- only the scan/redaction logic
# itself gets built/tested (against temp dirs), the first real scan is
# left for Zach to run and review by hand.

PROJECT="senechal"
PROJECT_KEY="senechal"

PROJECT_REPO_PATH="/home/zach/Documents/Projects/senechal"

REPO_URL="/home/zach/git-remotes/senechal.git"
REPO_SUBDIR="."

# ===========================================================================
# TIER 1 -- bug sweeper: DISABLED. senechal has no live web tracker.
# ===========================================================================
SWEEP_JOB_NAME=""

# ===========================================================================
# TIER 2 -- overnight batch: paced participant (see schedule/_paced.conf).
# ===========================================================================
BATCH_JOB_NAME="senechal-nightly-batch"
BATCH_PROMPT="/nightly-batch"
BATCH_CRON="auto"
BATCH_MAX_TURNS="120"

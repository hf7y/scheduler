# sequestria -- carbon-capture seltzer brand/landing-page concept,
# scaffolded by realisateur from a dropped inbox note. Registered
# 2026-07-20.
#
# Unlike this ecosystem's other projects, this one's nightly scope is
# fenced substantially tighter than usual -- see its own
# .claude/FOCUS.md's "hard fences" (no real supplier/certification
# claims, no domain/trademark/company formation, no spending real money,
# no contacting anyone on the waitlist). It's registered as a normal Tier
# 2 paced participant anyway since copy/design/code iteration on a static
# landing page is fully reversible -- flagged as a judgment call in
# realisateur's own QUESTIONS.md in case Zach would rather do brand/taste
# work like this by hand instead.
#
# Follows the crt/realisateur precedent: git repo pushed to a LOCAL bare
# remote (no credentials/network needed), generic bin/scheduler-run
# entrypoint, joins the usage-paced governor (see schedule/_paced.conf)
# instead of a fixed cron time.

PROJECT="sequestria"
PROJECT_KEY="sequestria"

PROJECT_REPO_PATH="/home/zach/Documents/Projects/sequestria"

REPO_URL="/home/zach/git-remotes/sequestria.git"
REPO_SUBDIR="."

# ===========================================================================
# TIER 1 -- bug sweeper: DISABLED. sequestria has no live web tracker.
# ===========================================================================
SWEEP_JOB_NAME=""

# ===========================================================================
# TIER 2 -- overnight batch: paced participant (see schedule/_paced.conf).
# ===========================================================================
BATCH_JOB_NAME="sequestria-nightly-batch"
BATCH_PROMPT="/nightly-batch"
BATCH_CRON="auto"
BATCH_MAX_TURNS="120"

# Participants for usage-paced-runner.sh  --  one per line:
#   name|enabled|command
#   name|enabled|weight|command   (weight is OPTIONAL, see below)
#
# The runner round-robins the ENABLED participants and runs ONE cycle each time
# usage-gate.sh reports spare weekly quota (see bin/usage-paced-runner.sh).
# Underscore prefix keeps this file out of sync-crontab.sh's project glob.
#   enabled: 1 = in rotation, 0 = parked
#   weight:  positive integer, default 1 if the field is omitted. A weight-N
#            participant gets N turns per 1 turn a weight-1 participant gets.
#            This is a MECHANICAL priority knob only -- scheduler enforces it,
#            it never sets it. The judgment of WHAT should get more/fewer
#            turns (a project converging on something real vs. one still
#            speculative/vision-debt-prone) lives in realisateur, which is
#            expected to edit this field over time -- see
#            docs/priority-weight.md.
#   command: the wrapper to run for one cycle (its own flock/logging apply)
# scheduler + realisateur bumped 1->3 by /ideate 2026-07-23 (human-directed):
# these are the only two paced jobs that clear the *vision* backlog, which
# accrues faster than it drains (zero-cost human intake via `scheduler -i`
# vs. quota-gated dev cycles). Weight 3 (not always-top) gives them 3x turns
# out of whatever slack exists without starving the 10 operational batches.
# realisateur is expected to re-tune per docs/priority-weight.md. See
# DESIGN-NOTES.md (2026-07-23 vision-burndown entry).
# BOOTSTRAP, NOT STEADY-STATE (realisateur /ideate 2026-07-23): weight 3 is
# time-boxed. EXIT CONDITION -> drop both back toward 1 once (a) a per-project
# stability-milestone convention exists and (b) realisateur's triage parks
# ideas past the current milestone BY DEFAULT. Rationale: throughput can't
# converge an unbounded zero-cost intake (net -6..-10/wk); pruning is the real
# lever, so the bump only buys time to stand the pruner up. If you're reading
# this and (a)+(b) are done, reweight. See realisateur FOCUS.md 2026-07-23.

# gardien -- rsync+hardlink nightly backup of mandark/dexter onto a local
# RAID array, scaffolded by realisateur from a dropped inbox note.
# Registered 2026-07-22.
#
# Follows the crt/realisateur/groc-mangr/vim-arcade precedent: git repo
# pushed to a LOCAL bare remote (no credentials/network needed), generic
# bin/scheduler-run entrypoint, joins the usage-paced governor as a Tier 2
# participant (see schedule/_paced.conf) instead of a fixed cron time.
#
# Scope is unattended-safe because .claude/commands/nightly-batch.md and
# FOCUS.md both insist all real rsync logic stay exercised against temp
# directories in tests -- no unattended run should touch a real RAID mount
# or a real host until Zach has verified the base loop against real
# hardware himself.

PROJECT="gardien"
PROJECT_KEY="gardien"

PROJECT_REPO_PATH="/home/zach/Documents/Projects/gardien"

REPO_URL="/home/zach/git-remotes/gardien.git"
REPO_SUBDIR="."

# ===========================================================================
# TIER 1 -- bug sweeper: DISABLED. gardien has no live web tracker.
# ===========================================================================
SWEEP_JOB_NAME=""

# ===========================================================================
# TIER 2 -- overnight batch: paced participant (see schedule/_paced.conf).
# ===========================================================================
BATCH_JOB_NAME="gardien-nightly-batch"
BATCH_PROMPT="/nightly-batch"
BATCH_CRON="auto"
BATCH_MAX_TURNS="120"

# aedile -- AI email-operations role for the Virtual Krewe of Vaporwave
# (Media Arts Collective, co-directed by Zach and Tyler). Lives at
# aedile/ inside the shared GitHub monorepo
# git@github.com:media-arts-collective/wavebucks.git. Registered 2026-07-20.
#
# BESPOKE WRAPPER, not the shared engine / bin/scheduler-run -- see
# ~/.local/bin/aedile-nightly-batch-loop.sh's own header for why:
#   1. Shared, co-owned repo -- REVIEW-GATED, never auto-push/auto-merge
#      (explicit human choice 2026-07-20, over a direct-push alternative).
#      Commits land on aedile-nightly/<date>, based on context-tiers (where
#      the live work is, not main) for manual review + merge.
#   2. The real working copy routinely carries uncommitted WIP that the
#      user wants each cycle to pick up (also an explicit 2026-07-20
#      choice) -- the wrapper works in a `git worktree` off the REAL local
#      clone (stash-transplanted in), not a disposable network clone, so
#      that WIP is visible to the run. Verified 2026-07-20 (SCHED_DRYRUN=1)
#      that the real working copy's uncommitted files survive byte-identical
#      after a cycle.
#
# No deploy key / SSH alias needed for this project: the wrapper never
# fetches or pushes over the network (worktree is local-only by design),
# so cron's missing ssh-agent (see scheduler-cron-ssh-auth) doesn't apply.

PROJECT="aedile"
PROJECT_KEY="aedile"

# Real working copy (used for the focus/+questions/ symlinks). The
# scheduler job itself operates on this SAME clone via a worktree -- not a
# separate dedicated clone -- see the wrapper.
PROJECT_REPO_PATH="/home/zach/Documents/vkv/wavebucks/aedile"

# ===========================================================================
# TIER 1 -- bug sweeper: DISABLED. No live tracker to sweep, and aedile's
# safety model (draft-only, allowlists, kill switch) makes a fast
# unreviewed sweep the wrong shape of job for this project regardless.
# ===========================================================================
SWEEP_JOB_NAME=""

# ===========================================================================
# TIER 2 -- overnight batch: MIGRATED to svc-vaporwave's own crontab
# 2026-07-20, to run under a separate Claude account and distribute usage
# off zach's own quota. Runs entirely outside this scheduler's control now
# -- see ~/bin/aedile-nightly-batch-loop.sh under svc-vaporwave's home (a
# rewritten fresh-clone/always-push version, not the worktree-based
# wrapper described above, which assumed a real interactive working copy
# svc-vaporwave doesn't have). Disabled here (BATCH_JOB_NAME="") so
# sync-crontab.sh does NOT also assign this project a fixed cron slot
# under zach's own account -- do not re-enable without first removing the
# job from svc-vaporwave's crontab, or it will run twice.
# ===========================================================================
BATCH_JOB_NAME=""

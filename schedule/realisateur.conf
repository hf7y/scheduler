# realisateur -- takes Zach's chaotically-dropped ideas (echoed text files,
# PNGs, whatever) and infers/wires them into real, scaffolded projects,
# registering each with this same scheduler ecosystem. Registered 2026-07-19.
#
# Follows the crt precedent exactly: git repo pushed to a LOCAL bare remote
# (no credentials/network needed), generic bin/scheduler-run entrypoint (no
# bespoke ~/.local/bin wrapper logic beyond the thin path-safety exec), joins
# the usage-paced governor as a Tier 2 participant (see schedule/_paced.conf)
# instead of a fixed cron time.
#
# Scope is unattended-safe because .claude/commands/nightly-batch.md only
# processes the inbox + FOCUS.md and treats anything irreversible (real
# GitHub credentials, messages to people, spending money) as a
# .claude/QUESTIONS.md case rather than acting on it directly.

PROJECT="realisateur"
PROJECT_KEY="realisateur"

PROJECT_REPO_PATH="/home/zach/Documents/Projects/realisateur"

REPO_URL="/home/zach/git-remotes/realisateur.git"
REPO_SUBDIR="."

# ===========================================================================
# TIER 1 -- bug sweeper: DISABLED. realisateur has no live web tracker.
# ===========================================================================
SWEEP_JOB_NAME=""

# ===========================================================================
# TIER 2 -- overnight batch: paced participant (see schedule/_paced.conf).
# ===========================================================================
BATCH_JOB_NAME="realisateur-nightly-batch"
BATCH_PROMPT="/nightly-batch"
BATCH_CRON="auto"
BATCH_MAX_TURNS="120"

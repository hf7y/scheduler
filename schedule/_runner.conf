# Meta config for the usage-paced dispatcher (read by bin/sync-crontab.sh).
#
# The mere PRESENCE of this file switches Tier 2 (nightly batch/dev) away from
# fixed clock times to USAGE-PACED dispatch: sync-crontab emits ONE tick line
# for the runner and SUPPRESSES the fixed BATCH cron of every project listed
# (enabled) in schedule/_paced.conf. The runner then round-robins those
# participants, running one cycle whenever usage-gate.sh reports spare weekly
# quota. Tier 1 (bug-sweeps) are never affected.
#
# ROLLBACK to fixed nightly times: delete this file and re-run
#   bin/sync-crontab.sh --apply
# The projects' BATCH_* config was never touched, so their old lines come back.
RUNNER_JOB="scheduler-paced-runner"
RUNNER_CMD="/home/zach/.local/bin/usage-paced-runner.sh"
RUNNER_CRON="*/15 * * * *"
PACED_SUPPRESS_BATCH=1

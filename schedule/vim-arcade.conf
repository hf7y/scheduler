# vim-arcade -- platformer-style vim-motion teaching game, scaffolded by
# realisateur from a dropped inbox note. Registered 2026-07-20.
#
# Follows the crt/realisateur/groc-mangr precedent: git repo pushed to a
# LOCAL bare remote (no credentials/network needed), generic
# bin/scheduler-run entrypoint, joins the usage-paced governor as a Tier 2
# participant (see schedule/_paced.conf) instead of a fixed cron time.
#
# Scope is unattended-safe because .claude/commands/nightly-batch.md only
# builds against FOCUS.md's stated priorities (new vim-motion levels/
# mechanics, all unit-tested and curses-free) -- the one genuinely open
# design fork (tmux interactions) is explicitly flagged as a
# QUESTIONS.md-worthy proposal rather than something to guess deep on.

PROJECT="vim-arcade"
PROJECT_KEY="vim-arcade"

PROJECT_REPO_PATH="/home/zach/Documents/Projects/vim-arcade"

REPO_URL="/home/zach/git-remotes/vim-arcade.git"
REPO_SUBDIR="."

# ===========================================================================
# TIER 1 -- bug sweeper: DISABLED. vim-arcade has no live web tracker.
# ===========================================================================
SWEEP_JOB_NAME=""

# ===========================================================================
# TIER 2 -- overnight batch: paced participant (see schedule/_paced.conf).
# ===========================================================================
BATCH_JOB_NAME="vim-arcade-nightly-batch"
BATCH_PROMPT="/nightly-batch"
BATCH_CRON="auto"
BATCH_MAX_TURNS="120"

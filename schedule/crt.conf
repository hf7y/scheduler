# crt -- voice-driven Claude Code console (landline handset + CRT + Debian VM
# on the Windows mini-PC 'dexter'). Registered here 2026-07-19.
#
# TIER 2 WIRED IN 2026-07-19: crt is now a git repo pushed to a LOCAL bare
# remote (git-remotes/crt.git, no credentials/network needed), and joins the
# usage-paced governor as a Tier 2 participant (see schedule/_paced.conf) --
# NOT a fixed cron time. Uses the generic bin/scheduler-run entrypoint (no
# bespoke ~/.local/bin wrapper needed for a brand-new project) via
# BATCH_PROMPT below, so BATCH_CRON stays "auto" but is suppressed by
# sync-crontab.sh anyway since crt is in _paced.conf (paced participants
# dispatch through usage-paced-runner.sh, not their own cron line).
#
# Scope is unattended-safe because .claude/commands/nightly-batch.md
# explicitly branches around anything physical/hardware/live-VM (most of
# this project's backlog) and only touches the code-shaped items in
# .claude/FOCUS.md's "Now" section -- see that file for what's actually in
# scope tonight.

PROJECT="crt"
PROJECT_KEY="crt"

# Local working copy -- lets sync-crontab.sh symlink .claude/FOCUS.md (and
# create/symlink QUESTIONS.md) into ../focus/ and ../questions/ here.
PROJECT_REPO_PATH="/home/zach/Documents/Projects/crt"

# Clonable source for the disposable clone: a LOCAL bare repo (not GitHub), so
# the engine's clone + reset --hard + push cycle needs no credentials/network
# and the VM password in HANDOFF.md never leaves the machine. Deploy key
# ~/.ssh/crt_deploy_key (host alias github-crt-deploy) is ready if a private
# GitHub mirror is wanted later.
REPO_URL="/home/zach/git-remotes/crt.git"
REPO_SUBDIR="."

# ===========================================================================
# TIER 1 -- bug sweeper: DISABLED (blank job name).
# ===========================================================================
SWEEP_JOB_NAME=""

# ===========================================================================
# TIER 2 -- overnight batch: paced participant (see schedule/_paced.conf).
# Generic bin/scheduler-run entrypoint -- no BATCH_SCRIPT, so no legacy
# wrapper needed. EXPIRY_DAYS left at the engine default (7): if crt's
# scope stalls or the human forgets about it, it self-disables rather than
# running forever unattended -- bump it (or re-run bin/sync-crontab.sh
# after a fresh review) to renew.
# ===========================================================================
BATCH_JOB_NAME="crt-nightly-batch"
BATCH_PROMPT="/nightly-batch"
BATCH_CRON="auto"
BATCH_MAX_TURNS="120"

# ===========================================================================
# VM-report-sync freshness (2026-07-19) -- reuses bin/morning-report.sh's
# existing DEPLOY_FRESH_CMD/DEPLOY_CMD probe hook (built for vkv-inventory's
# clasp-deploy staleness signal) for a conceptually similar but distinct
# problem: crt now has a SECOND autonomy tier that runs directly ON crt-vm
# (real mic/display/printer access, see crt's own VM-JOBS.md), outside this
# scheduler engine entirely -- its reports live on the VM's own filesystem
# until bin/crt-sync-vm-reports.sh (in the crt repo) pulls them to mandark.
# This probe just makes a stale/missing pull visible in the morning
# aggregate, the same way a pending clasp deploy is -- it does NOT run the
# sync itself (DEPLOY_CMD is presented as the manual/next step, same as
# every other project's use of this hook today). Written this session;
# NOT yet exercised against a real sync (no VM access to test the pull
# against), so the freshness window (36h) is a guess, not a measurement.
DEPLOY_FRESH_CMD='f="$HOME/reports/crt/vm/LATEST.md"; [ -f "$f" ] && [ $(( $(date +%s) - $(stat -c %Y "$f" 2>/dev/null || echo 0) )) -lt 129600 ]'
DEPLOY_CMD="/home/zach/Documents/Projects/crt/bin/crt-sync-vm-reports.sh"

# crt -- voice-driven Claude Code console (landline handset + CRT + Debian VM
# on the Windows mini-PC 'dexter'). Registered here 2026-07-19.
#
# AUTONOMOUS TIERS ARE DELIBERATELY OFF (both *_JOB_NAME blank), so this conf
# adds NO cron lines -- it only registers crt in the config registry and, on
# `sync-crontab.sh --apply`, symlinks its .claude/FOCUS.md into ../focus/crt.md
# so the deferred-feature backlog is browsable alongside every other project.
#
# Why no autonomous jobs: crt isn't a git repo (no REPO_URL to clone), and its
# deferred work is mostly PHYSICAL -- plugging in a MIDI controller, wiring a
# hookswitch, printing a Benchy, building a USB audio module -- which an
# unattended `claude -p` cannot do. The interactive focus is the core STT
# pipeline; see PROJECT_REPO_PATH/.claude/FOCUS.md for the parked list.
#
# To enable a nightly batch later (only worth it for the code-shaped items like
# the USB-module firmware or a video wrapper): make crt a git repo with a
# passphrase-less deploy remote, set REPO_URL + BATCH_JOB_NAME + BATCH_CRON
# below, then `bin/sync-crontab.sh --apply`.

PROJECT="crt"
PROJECT_KEY="crt"

# Local working copy -- lets sync-crontab.sh symlink .claude/FOCUS.md (and
# create/symlink QUESTIONS.md) into ../focus/ and ../questions/ here.
PROJECT_REPO_PATH="/home/zach/Documents/Projects/crt"

# No clone target yet (not a git repo). Fill in when enabling autonomous tiers.
REPO_URL=""
REPO_SUBDIR="."

# ===========================================================================
# TIER 1 -- bug sweeper: DISABLED (blank job name).
# ===========================================================================
SWEEP_JOB_NAME=""

# ===========================================================================
# TIER 2 -- overnight batch: DISABLED (blank job name).
# ===========================================================================
BATCH_JOB_NAME=""

# vkv-inventory's schedule entry. JOB_NAME/PROJECT_KEY values here match
# ~/.local/bin/vkv-inventory-bug-sweep-loop.sh and
# ~/.local/bin/vkv-inventory-nightly-batch-loop.sh exactly (both migrated
# onto lib/sweep-loop-common.sh, 2026-07-17).
#
# CRON VALUES BELOW ARE PROPOSED DEFAULTS, matching chezz.conf's own
# (9am-9pm daytime sweep window, 1am nightly batch) for consistency across
# projects -- not an independently confirmed decision for THIS project.
# Edit SWEEP_CRON/BATCH_CRON below to whatever hours are actually wanted,
# then run `bin/sync-crontab.sh --apply` again.
#
# Unlike chezz, there is no old raw crontab line to remove first --
# vkv-inventory has never had anything installed to crontab before this.

PROJECT="vkv-inventory"
# Where this project's own working copy lives -- used by bin/sync-crontab.sh
# to symlink its .claude/QUESTIONS.md into ../questions/<PROJECT>.md, so
# every project's flagged questions are browsable from one place without
# duplicating the file. Optional: leave blank/omit to skip the symlink for
# a project that doesn't have a local working copy in this exact shape.
PROJECT_REPO_PATH="/home/zach/Documents/vkv/inv/inventory-app"

# PAUSED 2026-07-19 pending migration into the usage-paced governor (see
# scheduler-usage-pacing task backlog) -- fixed-cron Tier 1 sweeps compete
# with the burn-rate pacing on Tier 2, so sweeps are parked (blank
# SWEEP_JOB_NAME = tier disabled, per sync-crontab.sh) until they're folded
# into usage-gate.sh dispatch too. To re-enable as-is in the meantime,
# restore SWEEP_JOB_NAME/SWEEP_SCRIPT/SWEEP_CRON below + re-run
# bin/sync-crontab.sh --apply.
SWEEP_JOB_NAME=""
# SWEEP_SCRIPT="/home/zach/.local/bin/vkv-inventory-bug-sweep-loop.sh"
# SWEEP_CRON="*/15 9-21 * * *"

BATCH_JOB_NAME="vkv-inventory-nightly-batch"
BATCH_SCRIPT="/home/zach/.local/bin/vkv-inventory-nightly-batch-loop.sh"
BATCH_CRON="auto"  # let bin/sync-crontab.sh assign a batch slot (see
                    # schedule/_batch.conf) instead of a hand-picked time

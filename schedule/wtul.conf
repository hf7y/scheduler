# wtul's schedule entry. JOB_NAME/PROJECT_KEY here match
# ~/.local/bin/wtul-batch-loop.sh exactly.
#
# No Tier 1 (bug-sweep) - wtul is a personal CLI/hardware tool with no
# live web tracker for a fast sweep to read from (see the wrapper
# script's own header comment).
#
# BATCH_CRON: confirmed with Zach - Wednesday and Saturday, early AM.
# Cron's day-of-week field takes a comma list, so one line covers both
# (3 = Wednesday, 6 = Saturday) - no bi-weekly workaround needed, and
# twice a week clears the shared engine's default 7-day EXPIRY_DAYS
# comfortably (wrapper still sets 14 for extra margin, no need to change
# it). Edit this line, then run bin/sync-crontab.sh --apply.

PROJECT="wtul"
PROJECT_REPO_PATH="/home/zach/Documents/wtul"

SWEEP_JOB_NAME=""
SWEEP_SCRIPT=""
SWEEP_CRON=""

BATCH_JOB_NAME="wtul-batch"
BATCH_SCRIPT="/home/zach/.local/bin/wtul-batch-loop.sh"
BATCH_CRON="14 3 * * 3,6"

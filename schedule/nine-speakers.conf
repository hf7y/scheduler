# everything it touches is code and reversible.

PROJECT="nine-speakers"
PROJECT_KEY="nine-speakers"

PROJECT_REPO_PATH="/home/zach/Documents/Projects/nine-speakers"

REPO_URL="/home/zach/git-remotes/nine-speakers.git"
REPO_SUBDIR="."

# ===========================================================================
# TIER 1 -- bug sweeper: DISABLED. nine-speakers has no live web tracker.
# ===========================================================================
SWEEP_JOB_NAME=""

# ===========================================================================
# TIER 2 -- overnight batch: paced participant (see schedule/_paced.conf).
# ===========================================================================
BATCH_JOB_NAME="nine-speakers-nightly-batch"
BATCH_PROMPT="/nightly-batch"
BATCH_CRON="auto"
BATCH_MAX_TURNS="120"

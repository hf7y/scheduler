# home_assistant project's schedule entry. Tier 2 (nightly-batch) only --
# no Tier 1 bug-sweeper for this project (it doesn't have a fast-moving
# codebase with mechanical bugs the way chezz/vkv-inventory do; it's a
# home-automation config/docs repo backed by a live physical instance).
#
# JOB_NAME/PROJECT_KEY match ~/.local/bin/home-assistant-nightly-batch-loop.sh
# exactly (confirmed 2026-07-17).
#
# BATCH_CRON="auto" -- bin/sync-crontab.sh assigns a batch slot (see
# schedule/_batch.conf) instead of a hand-picked time.

PROJECT="home-assistant"
# Real working copy (used to symlink .claude/QUESTIONS.md into
# ../questions/<PROJECT>.md, and where the wrapper's own
# .session-handoff/ secrets copy-in reads from).
PROJECT_REPO_PATH="/home/zach/Documents/Project Archive/home_assistant"

BATCH_JOB_NAME="home-assistant-nightly-batch"
BATCH_SCRIPT="/home/zach/.local/bin/home-assistant-nightly-batch-loop.sh"
BATCH_CRON="auto"

# Global config for Tier 2 auto-staggering, read by bin/sync-crontab.sh.
# Optional -- these are also the script's own built-in defaults, so this
# file only needs to exist once you want to change them. Leading
# underscore keeps this out of the schedule/*.conf glob every per-project
# entry is read from -- it's not a project.
#
# Any project's schedule/<project>.conf with BATCH_CRON="auto" (or left
# blank) gets assigned the next slot, in order by PROJECT name, starting
# at BATCH_BASE_TIME and spaced BATCH_STAGGER_MINUTES apart -- e.g. with
# the defaults below: 01:00, 01:30, 02:00, 02:30, ... A slot that would
# exactly collide with another project's EXPLICITLY set BATCH_CRON is
# skipped forward automatically.
#
# This is the seed of "run nightly jobs in batches" -- more to layer on
# here later (e.g. a max-concurrent-jobs cap per slot, explicit named
# batches instead of one long implicit sequence).

BATCH_BASE_TIME="01:00"
BATCH_STAGGER_MINUTES=30

# Meta config for `scheduler sweep`'s cron tick (read by bin/sync-crontab.sh).
#
# Independent of and NOT gated by usage-gate.sh / the paced governor
# (_runner.conf, _paced.conf) -- sweep is pure git/bash (git status, git
# rev-list, single-file git add+commit), zero Claude API calls, zero
# spend. Folding it into the same usage-paced dispatch that exists
# specifically to protect API quota would be gating an unrelated concern
# for no reason, and would make it run LESS often than it safely could.
# Runs as its own simple, always-on tick instead.
#
# DELETE this file (and re-run bin/sync-crontab.sh --apply) to stop
# running sweep on a schedule -- `scheduler sweep` still always works by
# hand regardless.
SWEEP_TICK_JOB="scheduler-sweep-tick"
SWEEP_TICK_CMD="/home/zach/.local/bin/scheduler sweep"
SWEEP_TICK_CRON="*/15 * * * *"

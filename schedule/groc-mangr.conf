# groc-mangr -- invisible fridge/shopping-list manager, scaffolded by
# realisateur from a dropped inbox note. Registered 2026-07-20.
#
# Follows the crt/realisateur precedent: git repo pushed to a LOCAL bare
# remote (no credentials/network needed), generic bin/scheduler-run
# entrypoint (no bespoke ~/.local/bin wrapper logic beyond the thin
# path-safety exec), joins the usage-paced governor as a Tier 2
# participant (see schedule/_paced.conf) instead of a fixed cron time.
#
# Scope is unattended-safe because .claude/commands/nightly-batch.md only
# builds against FOCUS.md's stated priorities and treats anything
# irreversible as a .claude/QUESTIONS.md case rather than acting on it
# directly.

PROJECT="groc-mangr"
PROJECT_KEY="groc-mangr"

PROJECT_REPO_PATH="/home/zach/Documents/Projects/groc-mangr"

REPO_URL="/home/zach/git-remotes/groc-mangr.git"
REPO_SUBDIR="."

# ===========================================================================
# TIER 1 -- bug sweeper: DISABLED. groc-mangr has no live web tracker.
# ===========================================================================
SWEEP_JOB_NAME=""

# ===========================================================================
# TIER 2 -- overnight batch: paced participant (see schedule/_paced.conf).
# ===========================================================================
BATCH_JOB_NAME="groc-mangr-nightly-batch"
BATCH_PROMPT="/nightly-batch"
BATCH_CRON="auto"
BATCH_MAX_TURNS="120"
